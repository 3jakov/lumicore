version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lumico-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumico

  redis:
    image: redis:7-alpine
    container_name: lumico-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumico

  api:
    image: ${IMAGE_API:-ghcr.io/lumico/lumicore-api:latest}
    container_name: lumico-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMS_PROVIDER_API_KEY: ${SMS_PROVIDER_API_KEY}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      NODE_ENV: production
    networks:
      - lumico

  web:
    image: ${IMAGE_WEB:-ghcr.io/lumico/lumicore-web:latest}
    container_name: lumico-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - lumico

  nginx:
    image: nginx:alpine
    container_name: lumico-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - lumico

networks:
  lumico:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
